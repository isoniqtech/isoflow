name: Email IMAP sync

# Vercel Hobby só permite crons diários, por isso disparamos via GitHub
# Actions a cada 5 minutos. O endpoint /api/cron/email exige o header
# `Authorization: Bearer ${CRON_SECRET}` (mesmo secret usado em produção).
#
# Setup:
#   1. GitHub repo → Settings → Secrets → New repository secret
#      - Name:  CRON_SECRET
#      - Value: (o mesmo CRON_SECRET que está em Vercel env)
#
# Para correr manualmente: Actions → Email IMAP sync → Run workflow.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: email-cron
      cancel-in-progress: false
    steps:
      - name: Trigger email cron
        run: |
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 540 \
            --write-out "\nHTTP_STATUS:%{http_code}\n" \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://isoflow-seven.vercel.app/api/cron/email)
          echo "$response"
          if echo "$response" | grep -q "HTTP_STATUS:2"; then
            echo "✓ Cron concluído"
          else
            echo "✗ Cron falhou"
            exit 1
          fi
